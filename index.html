<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMEBOUND</title>

<style>

body{
margin:0;
font-family:system-ui, sans-serif;
background:#0a0a0a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:92%;
max-width:420px;
text-align:center;
}

.hidden{
display:none;
}

button{
padding:14px;
margin:6px;
font-size:16px;
border:none;
border-radius:6px;
background:#222;
color:white;
}

button:hover{
background:#333;
}

input[type=range]{
width:100%;
}

.gauge{
height:40px;
border-radius:8px;
overflow:hidden;
margin:20px 0;
position:relative;

background:linear-gradient(
90deg,
#1e88e5 0%,
#9575cd 25%,
#ffd54f 50%,
#ffb74d 75%,
#ef5350 95%
);
}

.marker{
position:absolute;
top:0;
bottom:0;
width:3px;
background:white;
}

.watch{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:32px;
}

.zone{
font-size:22px;
margin-top:8px;
}

.time{
font-size:40px;
margin:20px 0;
}

.note{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
}

</style>
</head>

<body>

<div class="container">

<!-- READY -->

<div id="ready">

<h2>TIMEBOUND</h2>

<p>Duration</p>

<button onclick="setPreset(3)">3m</button>
<button onclick="setPreset(5)">5m</button>
<button onclick="setPreset(10)">10m</button>
<button onclick="setPreset(25)">25m</button>

<p>Custom Minutes</p>

<input id="durationSlider" type="range" min="1" max="60" value="10">

<p>Severity</p>

<select id="severity">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option selected>5</option>
</select>

<br><br>

<button onclick="startSession()">Start Session</button>

</div>

<!-- ACTIVE -->

<div id="active" class="hidden">

<div class="gauge">
<div id="marker" class="marker"></div>
</div>

<div class="zone" id="zoneLabel">BLUE</div>

<div class="time" id="remaining">00:00</div>

<button onclick="enterWatch()">Watch Mode</button>

</div>

<!-- WATCH -->

<div id="watch" class="watch hidden">

<div id="watchZone"></div>
<div id="watchTime"></div>

</div>

<!-- EXPIRED -->

<div id="expired" class="hidden">

<h2>Session Complete</h2>

<button onclick="openResolve()">Resolve</button>

</div>

<!-- RESOLVE -->

<div id="resolve" class="hidden">

<h3>Outcome</h3>

<button onclick="saveResult('held')">Held</button>
<button onclick="saveResult('missed')">Missed</button>
<button onclick="saveResult('acknowledged')">Acknowledged</button>

<textarea class="note" id="note" placeholder="Optional note"></textarea>

</div>

</div>

<script>

let startTime
let duration
let lastZone=""

const ding=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
const tone=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

function setPreset(m){

document.getElementById("durationSlider").value=m

}

function startSession(){

duration=document.getElementById("durationSlider").value*60*1000

startTime=Date.now()

show("active")

update()

}

function update(){

let elapsed=Date.now()-startTime
let progress=elapsed/duration
let remaining=Math.max(0,duration-elapsed)

let zone=getZone(progress)

if(zone!==lastZone){

ding.play()

if(zone==="RED"){
for(let i=0;i<4;i++){
setTimeout(()=>ding.play(),200*(i+1))
}
}

lastZone=zone

}

if(progress>=1){

tone.play()

show("expired")

return

}

updateGauge(progress)
updateTime(remaining)
updateZone(zone)

requestAnimationFrame(update)

}

function getZone(p){

if(p<0.25) return "BLUE"
if(p<0.5) return "LAVENDER"
if(p<0.75) return "GOLD"
if(p<0.95) return "AMBER"
if(p<1) return "RED"
return "EXPIRED"

}

function updateGauge(p){

let marker=document.getElementById("marker")
marker.style.left=(p*100)+"%"

}

function updateTime(ms){

let s=Math.floor(ms/1000)
let m=Math.floor(s/60)

s=s%60

let text=m+":"+(s<10?"0":"")+s

document.getElementById("remaining").textContent=text

document.getElementById("watchTime").textContent=text

}

function updateZone(z){

document.getElementById("zoneLabel").textContent=z
document.getElementById("watchZone").textContent=z

let watch=document.getElementById("watch")

let colors={
BLUE:"#1e88e5",
LAVENDER:"#9575cd",
GOLD:"#ffd54f",
AMBER:"#ffb74d",
RED:"#ef5350"
}

watch.style.background=colors[z]||"#000"

}

function enterWatch(){

show("watch")

}

document.getElementById("watch").onclick=()=>show("active")

function openResolve(){

show("resolve")

}

function saveResult(type){

console.log({
result:type,
note:document.getElementById("note").value
})

show("ready")

}

function show(id){

["ready","active","watch","expired","resolve"].forEach(s=>{
document.getElementById(s).classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
